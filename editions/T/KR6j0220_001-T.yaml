body:
  text: 罽賓國三藏沙門般若奉詔譯如是我聞一時佛在舍衛國祇樹給孤獨園與大苾芻眾及菩薩摩訶薩眾俱爾時波斯匿王在大眾中即從座起整理衣服偏袒右肩右膝著地禮佛雙足合掌恭敬而白佛言希有世尊相師占我却後七日必當壽盡我為無常苦所逼惱無所依仰來投世尊唯願世尊為我救護云何令我得離憂苦佛告言大王善自安慰勿得憂怖諸佛如來有善方便能令大王獲殊勝利近延壽命當得阿耨多羅三藐三菩提諦聽諦聽善思念之吾當為汝分別解說大王當知若欲免離無常苦惱超入如來法身壽量應先發心持佛淨戒修最上福能發此心延王壽命王白佛言唯願世尊為我救護所說發心持佛淨戒修最上福我便奉行亦令國人奉行此法未知發心何等心持何等戒何福最上唯願如來為我宣說佛告大王言發心者發四無量心言持戒者持不殺戒修上福者無過造塔悲愍救護一切眾生諸天善神常來守護不相捨離如影隨形發生大王無邊福利大王建立佛塔福利難思三世如來所共稱讚我為大王略說因緣王當諦聽乃往古昔有一小兒此地牧牛有諸相師來共占相謂言此牧牛兒却後七日必當壽盡是牧牛兒又於異時與諸小兒聚沙為戲中有小兒摧沙為堆言作佛塔高一磔手或二或三至四磔手時此小兒戲聚沙塔高一磔手却後更延七年壽命於聚沙時有辟支佛持鉢而行時諸小兒以嬉戲心將沙奉施言我施時辟支佛引鉢受之以神通力沙變成時諸小兒見此因緣皆悉獲得清淨信心時辟支佛與諸小兒悉授記莂作如是言汝諸童子所造之塔高一磔手者於未來世作鐵輪王王一天下二磔手者作銅輪王王二天下三磔手者作銀輪王王三天下四磔手者作金輪王王四天下時諸小兒以嬉戲心造如是塔感如是果何況大王發至誠心若有善男子善女人以決定心如法造塔乃至一肘量一磔手一指節一穬麥所得功德無有限量常有諸天雨花供養是故大王若善男子善女人欲造塔時先於一切眾生起大悲心而為先導以菩提心而為根本然後淨地作壇供養以瞿摩夷塗之燒香散花面正東坐作是思惟佛薄伽梵自利利他功德圓滿復能滿足眾生之願我今成就第一法身發菩提心於薄伽梵所有造塔軌儀法則一一次第如法奉行第一採集妙華以陀羅尼加持七遍散布壇上供養如來陀羅尼曰曩謨薩怛他二合耶埵阿耨羯多跛羅底瑟恥二合帝布數波罽􅇇答迷怛他蘖多耶三藐三母馱耶怛儞也二合他補澁閉補澁閉二合蘇補澁閉二合􅁥娑縛二合賀引第二埏埴作泥團時作婀字觀此是如來法界身先當歸命作如是言曩謨捺闍溺崛芻二合􅚾悉底二合耶捺嚩平薩􅞣嚩怛他蘖多難滿泥上囉􅑈怛曩二合怛羅二合演輸梵阿閦鞞阿彌陀畔差子阿反薄伽梵阿􅝪哩也引嚩嚕枳帝濕嚩二合羅耶麌嚕正埏埴時以俱胝陀羅尼加持其泥二十一遍造一佛塔如造一俱胝佛塔所獲功德等無有異是故此陀羅尼名為俱胝陀羅尼陀羅尼曰怛儞也二合他唵􅋀蘇上佉澁茗四合􅋀蘇佉澁茗四合􅋀蘇佉澁麼四合阿耨羯諦訕諦訕諦誕諦誕諦儞平囉拘黎曳八戍嚩提九諦主嚩提十薩􅞣嚩母馱十一阿地瑟姹二合曩阿地瑟恥二合多阿母底羝十四􅁥娑嚩二合引賀引第三次於泥團作娑頗二合字觀當觀此泥團猶如水精又如頗胝迦寶內外清淨分明瑩徹以陀羅尼加持一遍陀羅尼曰唵嚩日羅二合嗢多皤嚩耶􅁥娑嚩二合引賀引第四次塗赤土時作火色觀即知一切世間出世間法皆從微塵而得成就作此觀已取乾赤土遍塗泥團觀一切法本來無生畢竟空寂作含字觀想此泥團如鎔金色然後造塔以陀羅尼加持一遍陀羅尼曰唵阿羅左尾羅左􅁥娑嚩二合引賀第五次以泥團入模時用陀羅尼加持一遍然後入模陀羅尼曰唵嚩日羅二合引馱都蘖􅝗陛􅁥娑嚩二合引賀引第六次入法身真言時用此陀羅尼加持一遍然後入印子中陀羅尼曰唵達摩馱都蘖􅝗陛􅁥娑嚩賀引第七次椎打塔印時用陀羅尼加持一遍然後椎打陀羅尼曰唵嚩日囉二合引補特伽羅拘吒耶拘吒耶􅁥娑嚩二合引賀第八次椎打竟以手作塔階時用陀羅尼加持一遍安置塔階陀羅尼曰唵嚩日羅二合引喻曬􅁥娑嚩二合引賀第九次塔正從模中出時用陀羅尼加持一遍然後出之陀羅尼曰唵達摩底珠􅁥娑嚩二合引賀第十次脫塔出模已安置塔時用陀羅尼加持一遍陀羅尼曰唵蘇鉢羅二合引底瑟恥二合多嚩日入羅二合􅁥娑嚩二合賀引第十一次安置塔座了以手按塔頂上以陀羅尼加持一遍陀羅尼曰唵跛羅藍三合摩哆喃曳平􅁥娑嚩二合引賀引第十二次於塔上安傘蓋時以陀羅尼加持一遍陀羅尼曰唵跛羅藍三合摩婀喻曬􅁥娑嚩二合賀佛告大王若善男子善女人以清淨心依此軌儀造作佛塔若自作若教人作若復讚歎若當信受所得功德與造佛塔等無差別當知是人於此一生不為一切毒藥所中壽命長遠無有橫死究竟當得不壞之身一切鬼神不敢逼近五星七曜隨順驅使一切怨家悉皆退散隨所生處身常無病一切眾生見皆歡喜無淨戒者淨戒滿足不調伏者能令調伏不清淨者能令清淨破齋戒者齋戒復生若犯四重及五無間極重罪業悉得消滅無始劫來障累皆盡若有女人欲求男者即生勇健福德之男四大天王常隨擁護造塔功德其福如是若塔破壞變作微塵風吹一塵散落他處塵所經過山林河海一切眾生觸斯塵者永更不受雜類之身捨身受生常得見佛大王若善男子善女人若於造塔及陀羅尼想觀分明一心憶念永離水難火難王難賊難刀兵等難無能傷害若於曠野若空閑處若於聚落及大會中能以此經宣告大眾即為救護眾生身命所獲福德量與空等若於後世書寫流通塔雖未造造塔功德等無有異我為大王及未來世一切眾生廣開造塔延命功德王當憶持爾時波斯匿王及諸大眾聞佛所說皆大歡喜信受奉行中天竺三藏牟尼室利說梵語西明寺大德賜紫沙門圓照筆授章教寺大德沙門鑑虛潤文靈雲校本云貞享四丁卯稔中春二十三日一校了淨嚴四十九載
